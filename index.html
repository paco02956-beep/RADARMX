<body>
<div id="root"></div>
<script type="text/babel">
const{useState}=React;
const data={
  fecha:"27 Mar 2026",semana:"Semana 13 / 2026",
  oportunidades:[
    {id:1,nivel:"ALTA",sector:"Logística última milla",codigo:"SCIAN 492110",region:"Bajío — León, Querétaro, SLP",demanda:87,oferta:23,tendencia:"+312%",dias:52,ventana:"6–18 meses",riesgo:"Bajo",driver:"Nearshoring industrial acelera demanda de entrega local no cubierta por operadores actuales.",inversion:"Media ($80k–$300k MXN)",señales:["Google Trends ↑312%","DENUE: baja densidad","MeLi logística ↑89%"]},
    {id:2,nivel:"ALTA",sector:"Salud preventiva / wellness",codigo:"SCIAN 621410",region:"CDMX — Alcaldías norte",demanda:79,oferta:31,tendencia:"+198%",dias:38,ventana:"4–12 meses",riesgo:"Bajo",driver:"Post-pandemia generó cambio estructural en hábitos. Norte CDMX subatendido vs sur.",inversion:"Baja ($30k–$100k MXN)",señales:["Búsquedas ↑198%","0 clínicas nuevas en DENUE zona norte","Ticket promedio alto"]},
    {id:3,nivel:"MEDIA",sector:"Educación técnica digital",codigo:"SCIAN 611519",region:"Monterrey + Guadalajara",demanda:68,oferta:44,tendencia:"+134%",dias:71,ventana:"3–9 meses",riesgo:"Medio",driver:"Demanda de talento tech supera oferta de escuelas. Empresas pagan por capacitación rápida.",inversion:"Baja ($20k–$80k MXN)",señales:["LinkedIn vacantes tech ↑67%","Bootcamps saturados","STPS subsidios disponibles"]},
    {id:4,nivel:"MEDIA",sector:"Alimentos funcionales / saludables",codigo:"SCIAN 311990",region:"Nacional — foco e-commerce",demanda:61,oferta:49,tendencia:"+89%",dias:90,ventana:"6–24 meses",riesgo:"Medio",driver:"Categoría en consolidación. Primeras marcas locales capturando mercado antes de grandes.",inversion:"Media ($100k–$500k MXN)",señales:["MeLi categoría ↑89%","Instagram engagement alto","Importaciones bajan"]},
    {id:5,nivel:"VIGILAR",sector:"Retail tradicional — papelería",codigo:"SCIAN 453210",region:"Nacional",demanda:28,oferta:71,tendencia:"–34%",dias:120,ventana:"En contracción",riesgo:"Alto",driver:"Digitalización y Amazon erosionan demanda. Segmento en declive estructural sostenido.",inversion:"Evitar apertura",señales:["Búsquedas ↓34%","Cierres DENUE ↑","Amazon MX ↑papelería online"]},
  ]
};
const cfg={
  ALTA:{bg:"rgba(0,255,135,0.08)",border:"#00FF87",badge:"#00FF87",text:"#000"},
  MEDIA:{bg:"rgba(255,214,10,0.08)",border:"#FFD60A",badge:"#FFD60A",text:"#000"},
  VIGILAR:{bg:"rgba(255,107,53,0.08)",border:"#FF6B35",badge:"#FF6B35",text:"#fff"},
};
function Bar({v,color}){return(
  <div style={{display:"flex",gap:4,alignItems:"center"}}>
    <div style={{flex:1,height:6,background:"#1a1a1a",borderRadius:3,overflow:"hidden"}}>
      <div style={{width:v+"%",height:"100%",background:color,borderRadius:3}}/>
    </div>
    <span style={{fontSize:10,color,fontFamily:"monospace",minWidth:28}}>{v}%</span>
  </div>
);}
function Card({op}){
  const[ex,setEx]=useState(false);
  const c=cfg[op.nivel];
  return(
    <div onClick={()=>setEx(!ex)} style={{background:c.bg,border:"1px solid "+c.border+"22",borderLeft:"3px solid "+c.border,borderRadius:12,padding:"20px 24px",cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{background:c.badge,color:c.text,fontSize:9,fontWeight:800,padding:"3px 8px",borderRadius:4,fontFamily:"monospace",letterSpacing:1}}>{op.nivel}</span>
          <span style={{fontSize:9,color:"#666",fontFamily:"monospace"}}>{op.codigo}</span>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:22,fontWeight:900,color:c.border,fontFamily:"monospace",lineHeight:1}}>{op.tendencia}</div>
          <div style={{fontSize:9,color:"#666",fontFamily:"monospace"}}>{op.dias} días</div>
        </div>
      </div>
      <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:4,fontFamily:"Georgia,serif"}}>{op.sector}</div>
      <div style={{fontSize:11,color:"#888",marginBottom:16,fontFamily:"monospace"}}>📍 {op.region}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#888",fontFamily:"monospace"}}><span>DEMANDA</span><span>OFERTA</span></div>
        <Bar v={op.demanda} color={c.border}/>
        <Bar v={op.oferta} color="#444"/>
      </div>
      {ex&&(
        <div style={{marginTop:18,paddingTop:18,borderTop:"1px solid #222"}}>
          <p style={{fontSize:12,color:"#bbb",lineHeight:1.7,marginBottom:16,fontFamily:"Georgia,serif"}}>{op.driver}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div style={{background:"#111",borderRadius:8,padding:12}}>
              <div style={{fontSize:9,color:"#666",fontFamily:"monospace",marginBottom:4}}>VENTANA</div>
              <div style={{fontSize:12,color:"#fff",fontWeight:600}}>{op.ventana}</div>
            </div>
            <div style={{background:"#111",borderRadius:8,padding:12}}>
              <div style={{fontSize:9,color:"#666",fontFamily:"monospace",marginBottom:4}}>INVERSIÓN</div>
              <div style={{fontSize:12,color:"#fff",fontWeight:600}}>{op.inversion}</div>
            </div>
          </div>
          <div style={{fontSize:9,color:"#666",fontFamily:"monospace",marginBottom:8}}>SEÑALES DETECTADAS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {op.señales.map((s,i)=>(
              <span key={i} style={{fontSize:10,color:c.border,background:c.border+"11",border:"1px solid "+c.border+"33",borderRadius:4,padding:"3px 8px",fontFamily:"monospace"}}>{s}</span>
            ))}
          </div>
        </div>
      )}
      <div style={{marginTop:12,fontSize:10,color:"#555",fontFamily:"monospace",textAlign:"right"}}>{ex?"▲ colapsar":"▼ ver detalle"}</div>
    </div>
  );
}
function App(){
  const[f,setF]=useState("TODAS");
  const niveles=["TODAS","ALTA","MEDIA","VIGILAR"];
  const lista=f==="TODAS"?data.oportunidades:data.oportunidades.filter(o=>o.nivel===f);
  return(
    <div style={{minHeight:"100vh",background:"#080808",color:"#fff",fontFamily:"system-ui,sans-serif",paddingBottom:60}}>
      <div style={{borderBottom:"1px solid #1a1a1a",padding:"28px 28px 24px",background:"linear-gradient(180deg,#0d0d0d,#080808)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#00FF87",boxShadow:"0 0 8px #00FF87",animation:"pulse 2s infinite"}}/>
              <span style={{fontSize:10,color:"#00FF87",fontFamily:"monospace",letterSpacing:2}}>SISTEMA ACTIVO</span>
            </div>
            <h1 style={{fontSize:28,fontWeight:900,margin:0,letterSpacing:-1,fontFamily:"Georgia,serif"}}>RADAR<span style={{color:"#00FF87"}}>MX</span></h1>
            <div style={{fontSize:11,color:"#555",fontFamily:"monospace",marginTop:2}}>Inteligencia de Mercado · México</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"#555",fontFamily:"monospace"}}>{data.semana}</div>
            <div style={{fontSize:13,color:"#888",fontFamily:"monospace",marginTop:2}}>{data.fecha}</div>
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,background:"#111",margin:"20px 28px",borderRadius:10,overflow:"hidden",border:"1px solid #1a1a1a"}}>
        {[{label:"OPORTUNIDADES",val:"4",sub:"detectadas"},{label:"SECTORES",val:"20",sub:"monitoreados"},{label:"FUENTES",val:"6",sub:"activas"}].map((s,i)=>(
          <div key={i} style={{padding:"16px 14px",background:"#0d0d0d",textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:900,color:"#fff",fontFamily:"monospace"}}>{s.val}</div>
            <div style={{fontSize:8,color:"#555",fontFamily:"monospace",letterSpacing:1}}>{s.label}</div>
            <div style={{fontSize:9,color:"#444",fontFamily:"monospace"}}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,padding:"0 28px",marginBottom:20,flexWrap:"wrap"}}>
        {niveles.map(n=>(
          <button key={n} onClick={e=>{e.stopPropagation();setF(n);}} style={{fontSize:10,fontFamily:"monospace",letterSpacing:1,padding:"6px 14px",borderRadius:6,border:f===n?"1px solid #00FF87":"1px solid #222",background:f===n?"#00FF8711":"transparent",color:f===n?"#00FF87":"#555",cursor:"pointer"}}>{n}</button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12,padding:"0 28px"}}>
        {lista.map(op=><Card key={op.id} op={op}/>)}
      </div>
      <div style={{padding:"32px 28px 0",borderTop:"1px solid #111",marginTop:32}}>
        <div style={{fontSize:10,color:"#333",fontFamily:"monospace",lineHeight:1.8}}>
          FUENTES: INEGI · DENUE · Google Trends · Mercado Libre · SAT<br/>
          ANÁLISIS: Claude API · Estadística inferencial · SCIAN 2023<br/>
          <span style={{color:"#222"}}>Reporte automático. No constituye asesoría financiera.</span>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
